name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    env:
      CI: true
      STARKNET_RPC_URL: https://starknet-sepolia.public.invalid/rpc
      POSTGRES_CONNECTION_STRING: postgresql://postgres:postgres@localhost:5432/stellopay_indexer

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stellopay_indexer
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stellopay_indexer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run --if-present lint

      - name: Test
        run: pnpm test

      - name: Generate coverage
        run: pnpm run test:coverage

      - name: Upload coverage artifact
        if: ${{ always() && hashFiles('coverage/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
